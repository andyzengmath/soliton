# Soliton PR Review — CI Gate (Block Merge on Critical Findings)
#
# Runs soliton review and fails the check if critical findings exist.
# Use with branch protection rules to block merge on critical issues.
#
# Setup:
#   1. Copy to .github/workflows/soliton-review.yml
#   2. Add ANTHROPIC_API_KEY secret
#   3. In repo Settings → Branches → Branch protection rules:
#      - Enable "Require status checks to pass before merging"
#      - Add "Soliton PR Review" as a required check
#
# Docs: https://github.com/andyzengmath/soliton/blob/main/docs/ci-cd-integration.md

name: Soliton PR Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: soliton-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Clone Soliton plugin
        run: git clone --depth 1 --branch v2.1.1 https://github.com/andyzengmath/soliton.git /tmp/soliton

      - name: Run Soliton review
        uses: anthropics/claude-code-action@ef50f123a3a9be95b60040d042717517407c7256 # v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --plugin-dir /tmp/soliton
          prompt: |
            Run /pr-review ${{ github.event.pull_request.number }} --output json

            After the review completes:

            1. Post a human-readable summary as a PR comment using gh pr comment.
               Include:
               - Risk score and level
               - Finding count by severity (critical, improvement, nitpick)
               - Overall recommendation (approve / request-changes / needs-discussion)
               - Each finding with its description and suggestion

            2. Write the result to a file:
               - If there are any CRITICAL severity findings, run:
                 echo "critical" > /tmp/soliton-result.txt
               - If there are no critical findings, run:
                 echo "pass" > /tmp/soliton-result.txt

            Post the comment first, then write the result file.
          allowed_tools: |
            Read
            Grep
            Glob
            Bash(git diff *)
            Bash(git log *)
            Bash(git show *)
            Bash(git branch *)
            Bash(gh pr comment *)
            Bash(gh pr diff *)
            Bash(gh pr view *)
            Bash(echo * > /tmp/soliton-result.txt)
            Agent

      - name: Check for critical findings
        run: |
          if [ ! -f /tmp/soliton-result.txt ]; then
            echo "::error::Soliton result file not found — review may have timed out or failed. Blocking merge."
            exit 1
          fi
          if grep -qx "critical" /tmp/soliton-result.txt; then
            echo "::error::Soliton found critical issues in this PR. See the review comment for details."
            exit 1
          else
            echo "No critical findings. Review passed."
          fi
