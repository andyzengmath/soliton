# Hallucination-AST library tests — closes POST_V2_FOLLOWUPS §G1.
#
# Runs lib/hallucination-ast/tests/ (149 unit tests + Khati 200-PR corpus
# validation, F1=0.968) on every PR or push that touches the package.
# Without this job, regressions to the deterministic AST pre-check land
# silently — only the manual `pytest tests/` command in the README's
# "Shipping gate" section would catch them.

name: hallucination-ast tests

on:
  pull_request:
    paths:
      - "lib/hallucination-ast/**"
      - ".github/workflows/hallucination-ast-tests.yml"
  push:
    branches: [main]
    paths:
      - "lib/hallucination-ast/**"
      - ".github/workflows/hallucination-ast-tests.yml"

concurrency:
  group: hallucination-ast-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: lib/hallucination-ast/pyproject.toml

      - name: Install package + dev deps
        working-directory: lib/hallucination-ast
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest with coverage
        working-directory: lib/hallucination-ast
        run: |
          pytest tests/ \
            --tb=short \
            --cov=hallucination_ast \
            --cov-report=term-missing \
            --cov-fail-under=80
