# Soliton fixture runner — partial automation closing POST_V2_FOLLOWUPS §G2.
#
# Runs tests/run_fixtures.py in two modes:
#   structural — validates every tests/fixtures/<name>/ has diff.patch +
#                 expected.json with the documented schema. No API needed.
#   phase4b    — for fixtures with `phase4bExpected`, runs the
#                 hallucination-ast CLI on the diff and asserts the emitted
#                 finding matches `rule`, `symbol`, and (optional) confidence
#                 / suggestedFix. Local CLI only, no API needed.
#
# The full /pr-review-driven runner (asserting risk ranges, finding counts,
# severity bands, and stacked-PR diff scoping across all 16 fixtures) requires
# Anthropic API auth in CI; that half of §G2 stays manual until
# ANTHROPIC_API_KEY (or the OAuth-token equivalent) lands in repo secrets —
# same blocker as the Soliton-Review dogfood workflow.

name: fixture runner

on:
  pull_request:
    paths:
      - "tests/fixtures/**"
      - "tests/run_fixtures.py"
      - "tests/run-fixtures.md"
      - "lib/hallucination-ast/**"
      - ".github/workflows/fixture-runner.yml"
  push:
    branches: [main]
    paths:
      - "tests/fixtures/**"
      - "tests/run_fixtures.py"
      - "lib/hallucination-ast/**"
      - ".github/workflows/fixture-runner.yml"

concurrency:
  group: fixture-runner-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  validate:
    name: validate fixtures + phase4b CLI
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: lib/hallucination-ast/pyproject.toml

      - name: Install hallucination-ast (provides the phase4b CLI)
        working-directory: lib/hallucination-ast
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install fixture-runtime modules (introspected by AST resolver)
        # The `hallucinated-import` fixture asserts the AST resolver flags
        # `requests.gett` as a typo. The resolver does that by introspecting
        # the actual `requests` module's __all__ — it can't operate on a
        # module that's not installed. Bare CI Python doesn't have requests,
        # so we install it here. (signature-mismatch uses `os` which is
        # stdlib, no extra install needed.)
        run: pip install "requests>=2"

      - name: Run fixture runner
        run: python tests/run_fixtures.py --mode all
