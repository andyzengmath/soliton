# Soliton PR Review — dogfooding soliton on itself
#
# Runs a risk-adaptive multi-agent code review on every pull request.
#
# REQUIRED secrets (set via repo Settings → Secrets and variables → Actions):
#   ANTHROPIC_API_KEY        — direct API key from console.anthropic.com
#                              (NOT available to Anthropic Console users — see below)
#
# Without ANTHROPIC_API_KEY (or the equivalent claude-code-action-supported
# CLAUDE_CODE_OAUTH_TOKEN) this workflow fails with:
#     "Either ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN is required when
#      using direct Anthropic API."
# A preflight step below short-circuits with a clearer error before the action
# is invoked, so maintainers see the actionable message instead of the action's
# internal env-validation error.
#
# Console users currently cannot generate ANTHROPIC_API_KEY (per
# reference_claude_code_action_auth.md memory). The workaround is the
# claude-code-action OAuth-token flow; tracking in
# idea-stage/POST_V2_FOLLOWUPS.md §B3 (Martian CRB upstream submission, blocked
# on the same auth chain).

name: Soliton PR Review

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"

concurrency:
  group: soliton-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Default to zero permissions; each job opts in explicitly.
permissions: {}

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
      # anthropics/claude-code-action@v1 requires an OIDC token for attribution;
      # without this the action fails with "Could not fetch an OIDC token".
      id-token: write

    steps:
      - name: Preflight — verify ANTHROPIC_API_KEY is configured
        # Replaces claude-code-action's cryptic "Environment variable validation
        # failed: Either ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN is required"
        # with an actionable error pointing at the repo Settings page. The secret
        # value itself never enters the bash environment — only a binary indicator.
        env:
          HAS_API_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' && '1' || '' }}
        run: |
          if [ -z "$HAS_API_KEY" ]; then
            echo "::error title=Soliton-Review missing required secret::ANTHROPIC_API_KEY is not configured for this repo. Add it via Settings → Secrets and variables → Actions. Console users without API access: see reference_claude_code_action_auth.md or POST_V2_FOLLOWUPS §B3 for the OAuth-token workaround."
            exit 1
          fi
          echo "ANTHROPIC_API_KEY present — proceeding with review."

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Soliton review
        uses: anthropics/claude-code-action@ef50f123a3a9be95b60040d042717517407c7256 # v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --plugin-dir .
          prompt: |
            Run /pr-review $PR_NUMBER

            After the review completes, WRITE the full markdown review to
            /tmp/soliton-review.md and then post it with:

              gh pr comment "$PR_NUMBER" --body-file /tmp/soliton-review.md

            Do NOT attempt to pass the review as an inline --body "<review>"
            argument — model-generated review content can contain backticks or
            $(...) which bash would command-substitute inside double quotes.
          allowed_tools: |
            Read
            Write
            Grep
            Glob
            Bash(git diff *)
            Bash(git log *)
            Bash(git show *)
            Bash(git branch *)
            Bash(gh pr comment *)
            Bash(gh pr diff *)
            Bash(gh pr view *)
            Agent

      - name: Assert review produced output
        # Fail the check if claude-code-action timed out or errored and never produced
        # a review file. Without this, an empty comment silently passes CI — the exact
        # fail-open class commit 5352e6c addressed for the gated workflow.
        run: |
          if [ ! -s /tmp/soliton-review.md ]; then
            echo "::error::Review produced no output at /tmp/soliton-review.md — claude-code-action may have timed out."
            exit 1
          fi
          echo "Review size: $(wc -c < /tmp/soliton-review.md) bytes"
