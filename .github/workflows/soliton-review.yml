# Soliton PR Review — dogfooding soliton on itself, via Claude Code OAuth token.
#
# Runs a risk-adaptive multi-agent code review on every pull request.
#
# AUTH PATH: claude_code_oauth_token. This works for Anthropic Console users
# (who can't provision a direct API key) by using a long-lived OAuth token
# tied to your Console subscription. The token is generated locally:
#
#   $ claude setup-token
#
# (Run from a logged-in Claude Code session; it walks you through the OAuth
# flow and prints a token to copy.) Save the output as a repo secret:
#
#   Settings → Secrets and variables → Actions → New repository secret
#     name:  CLAUDE_CODE_OAUTH_TOKEN
#     value: (the token from setup-token)
#
# CI usage counts against your Console subscription's plan limits.
#
# Alternative auth paths (if OAuth turns out org-policy-blocked):
#   - Direct API: replace `claude_code_oauth_token` with
#     `anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}`. Console users
#     in restricted orgs typically cannot generate this key.
#   - Microsoft Foundry (OIDC + Azure AD): see the Foundry-flavored draft at
#     `idea-stage/POST_V2_FOLLOWUPS.md` §B3 cross-link or the closed-but-
#     preserved PR #64 history. Requires deploying Claude on a Foundry
#     resource (~half-day Azure-portal setup).
#
# A preflight step below short-circuits with a clear error if the OAuth
# token secret is missing, so maintainers see actionable feedback instead
# of the action's internal env-validation error.

name: Soliton PR Review

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"

concurrency:
  group: soliton-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Default to zero permissions; each job opts in explicitly.
permissions: {}

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
      # anthropics/claude-code-action@v1 requires an OIDC token for attribution;
      # without this the action fails with "Could not fetch an OIDC token".
      id-token: write

    steps:
      - name: Preflight — verify CLAUDE_CODE_OAUTH_TOKEN is configured
        # Replaces claude-code-action's cryptic "Environment variable validation
        # failed: Either ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN is required"
        # with an actionable error pointing at the repo Settings page. The secret
        # value itself never enters the bash environment — only a binary indicator.
        env:
          HAS_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' && '1' || '' }}
        run: |
          if [ -z "$HAS_OAUTH" ]; then
            echo "::error title=Soliton-Review missing required secret::CLAUDE_CODE_OAUTH_TOKEN is not configured. Generate via 'claude setup-token' locally (logged in to your Console subscription), then add as a repo secret at Settings → Secrets and variables → Actions. See this workflow's top-of-file comment for full setup."
            exit 1
          fi
          echo "CLAUDE_CODE_OAUTH_TOKEN present — proceeding with review."

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Soliton review
        uses: anthropics/claude-code-action@ef50f123a3a9be95b60040d042717517407c7256 # v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --plugin-dir .
          prompt: |
            Run /pr-review $PR_NUMBER

            After the review completes, WRITE the full markdown review to
            /tmp/soliton-review.md and then post it with:

              gh pr comment "$PR_NUMBER" --body-file /tmp/soliton-review.md

            Do NOT attempt to pass the review as an inline --body "<review>"
            argument — model-generated review content can contain backticks or
            $(...) which bash would command-substitute inside double quotes.
          allowed_tools: |
            Read
            Write
            Grep
            Glob
            Bash(git diff *)
            Bash(git log *)
            Bash(git show *)
            Bash(git branch *)
            Bash(gh pr comment *)
            Bash(gh pr diff *)
            Bash(gh pr view *)
            Agent

      - name: Assert review produced output
        # Fail the check if claude-code-action timed out or errored and never produced
        # a review file. Without this, an empty comment silently passes CI — the exact
        # fail-open class commit 5352e6c addressed for the gated workflow.
        run: |
          if [ ! -s /tmp/soliton-review.md ]; then
            echo "::error::Review produced no output at /tmp/soliton-review.md — claude-code-action may have timed out."
            exit 1
          fi
          echo "Review size: $(wc -c < /tmp/soliton-review.md) bytes"
